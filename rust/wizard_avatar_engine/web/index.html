<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wizard Avatar Motion</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17191c;
      --line: #d9d9d4;
      --panel: rgba(255, 255, 255, 0.94);
      --accent: #0e4c89;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
    }

    .avatar-stage {
      position: relative;
      width: min(100vw, calc((100vh - 66px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #fff;
    }

    .avatar-figure {
      position: absolute;
      inset: 0;
    }

    .avatar-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #fff;
      image-rendering: pixelated;
    }

    .state-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .toolbar {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 40px rgba(23, 25, 28, 0.08);
    }

    .cluster { display: flex; align-items: center; gap: 6px; }
    .spacer { flex: 1; }

    button,
    select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button {
      min-width: 34px;
      padding: 0 9px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    button:hover,
    select:hover { border-color: var(--accent); }
    select { min-width: 124px; padding: 0 28px 0 9px; }

    .diagnostics {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      gap: 10px;
      align-items: center;
      color: #363a3e;
      font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
    }

    .diagnostics b { color: var(--ink); font-weight: 700; }

    @media (max-width: 760px) {
      .toolbar {
        left: 8px;
        right: 8px;
        bottom: 8px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .cluster { max-width: 100%; flex-wrap: wrap; }
      .spacer { display: none; }
      .diagnostics {
        width: 100%;
        grid-auto-flow: row;
        grid-template-columns: repeat(3, max-content);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="avatar-stage" aria-label="Animated wizard avatar">
      <div class="avatar-figure" id="avatar-figure">
        <canvas class="avatar-canvas" id="avatar-canvas" width="1600" height="900"></canvas>
      </div>
    </section>
  </main>
  <output class="state-label" id="state-label">state loading</output>
  <nav class="toolbar" aria-label="Wizard controls">
    <div class="cluster">
      <button data-command="walk_left" title="Walk left" aria-label="Walk left">&larr;</button>
      <button data-command="walk_forward" title="Walk toward camera" aria-label="Walk toward camera">&darr;</button>
      <button data-command="walk_backward" title="Walk away from camera" aria-label="Walk away from camera">&uarr;</button>
      <button data-command="walk_right" title="Walk right" aria-label="Walk right">&rarr;</button>
      <button data-command="stop" title="Stop" aria-label="Stop">&#9632;</button>
      <button data-command="return_to_center" title="Return to center" aria-label="Return to center">&#8962;</button>
    </div>
    <div class="cluster">
      <select id="expression" title="Expression" aria-label="Expression">
        <option value="neutral">neutral</option>
        <option value="happy">happy</option>
        <option value="thinking">thinking</option>
        <option value="surprised">surprised</option>
        <option value="worried">worried</option>
        <option value="amused">amused</option>
        <option value="confident">confident</option>
        <option value="focused">focused</option>
        <option value="skeptical">skeptical</option>
        <option value="explaining">explaining</option>
      </select>
      <button id="tour" title="Play motion tour on repeat" aria-label="Play motion tour on repeat" aria-pressed="false">&#9654;</button>
      <button data-action="thinking" title="Think" aria-label="Think">?</button>
      <button data-action="pointing" title="Point" aria-label="Point">&#8640;</button>
      <button data-action="explaining" title="Explain" aria-label="Explain">*</button>
      <button data-action="magic_cast" title="Cast" aria-label="Cast">&#10022;</button>
      <button data-action="reaction" title="React" aria-label="React">!</button>
      <button id="speak" title="Speak" aria-label="Speak">&#9680;</button>
    </div>
    <div class="spacer"></div>
    <output class="diagnostics" id="diagnostics">
      <span>ws <b id="diag-ws">idle</b></span>
      <span>fps <b id="diag-fps">0</b></span>
      <span>tag <b id="diag-tag">-</b></span>
      <span>seq <b id="diag-seq">0</b></span>
      <span>wire <b id="diag-wire">0</b></span>
    </output>
  </nav>
  <script type="module" src="/avatar/wizard.js"></script>
</body>
</html>
